# Neo4j Community — the single connected graph (the shared brain).
# Runs locally only during batch runs. Free to self-host. See docs/02-technical-approach.md §6.1.
#
#   docker compose up -d      # start
#   open http://localhost:7474  (Neo4j Browser; login neo4j / warpcompass)
#   docker compose down       # stop (data persists in the named volume)
#
# Change the password here AND in brain/.env before any real use.
services:
  neo4j:
    image: neo4j:5-community
    container_name: warp-compass-neo4j
    ports:
      - "7474:7474" # HTTP (Neo4j Browser)
      - "7687:7687" # Bolt (driver)
    environment:
      NEO4J_AUTH: neo4j/warpcompass
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  neo4j_logs:
